<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DENISIA | PURE LAUNCHER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
        }

        .fullscreen-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
            z-index: 1;
        }

        .loader-tiny {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: rgba(0, 255, 255, 0.6);
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            z-index: 999;
            pointer-events: none;
            letter-spacing: 1px;
        }
        
        /* Анти-DevTools затемнение */
        .anti-devtools-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            font-size: 28px;
            color: #ff3366;
            text-align: center;
            backdrop-filter: blur(12px);
            animation: blinkWarning 0.8s infinite;
        }
        @keyframes blinkWarning {
            0% { opacity: 0.9; text-shadow: 0 0 5px red; }
            100% { opacity: 1; text-shadow: 0 0 20px red; }
        }
    </style>
</head>
<body>

    <iframe id="appFrame" class="fullscreen-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>
    
    <div class="loader-tiny" id="statusMsg">⚡ DENISIA: LOADING SERVER CODE...</div>

    <script>
        (function() {
            // ======================================================
            // КЛЮЧ ОСТАВЛЕН НЕТРОНУТЫМ (ПО ТВОЕМУ ТРЕБОВАНИЮ)
            // ======================================================
            const CONFIG = {
                BIN_ID: '69d6c92436566621a8913306',
                MASTER_KEY: '$2a$10$NF86QybyNthy/LwCg9j8p.lqxDs96wRGqd.1MA95FZv3xLrU8HlYa'
            };

            const iframe = document.getElementById('appFrame');
            const statusDiv = document.getElementById('statusMsg');

            // ======================================================
            // МАКСИМАЛЬНАЯ БЛОКИРОВКА DEVTOOLS (НЕ ТРОГАЕТ КЛЮЧ)
            // ======================================================
            
            // 1. Уничтожение консоли (все методы)
            if (window.console) {
                const noop = function(){};
                const methods = ['log', 'warn', 'error', 'info', 'debug', 'trace', 'dir', 'table', 'group', 'groupCollapsed', 'groupEnd', 'clear', 'count', 'assert', 'profile', 'profileEnd'];
                for (let m of methods) {
                    if (window.console[m]) window.console[m] = noop;
                }
            }
            
            // 2. Блокировка ВСЕХ клавиш, открывающих DevTools
            window.addEventListener('keydown', function(e) {
                const key = e.key;
                // F12
                if (key === 'F12') { e.preventDefault(); e.stopPropagation(); return false; }
                // Ctrl+Shift+I / J / C / K
                if (e.ctrlKey && e.shiftKey && (key === 'I' || key === 'J' || key === 'C' || key === 'K')) {
                    e.preventDefault(); e.stopPropagation(); return false;
                }
                // Ctrl+U (просмотр исходного кода)
                if (e.ctrlKey && key === 'u') { e.preventDefault(); return false; }
                // Ctrl+S (сохранить)
                if (e.ctrlKey && key === 's') { e.preventDefault(); return false; }
                // Ctrl+P (печать)
                if (e.ctrlKey && key === 'p') { e.preventDefault(); return false; }
                // Ctrl+Shift+Delete
                if (e.ctrlKey && e.shiftKey && key === 'Delete') { e.preventDefault(); return false; }
                // Shift+F10 (контекстное меню)
                if (e.shiftKey && key === 'F10') { e.preventDefault(); return false; }
                // Ctrl+Shift+E (для некоторых браузеров)
                if (e.ctrlKey && e.shiftKey && key === 'E') { e.preventDefault(); return false; }
                // Ctrl+Shift+P (командная строка Chrome)
                if (e.ctrlKey && e.shiftKey && key === 'P') { e.preventDefault(); return false; }
                // Ctrl+Shift+O (панель элементов)
                if (e.ctrlKey && e.shiftKey && key === 'O') { e.preventDefault(); return false; }
                // Ctrl+Shift+F (поиск по файлам)
                if (e.ctrlKey && e.shiftKey && key === 'F') { e.preventDefault(); return false; }
                // Ctrl+Shift+G (перейти к строке)
                if (e.ctrlKey && e.shiftKey && key === 'G') { e.preventDefault(); return false; }
                // Ctrl+Shift+D (показать/скрыть консоль)
                if (e.ctrlKey && e.shiftKey && key === 'D') { e.preventDefault(); return false; }
            });
            
            // 3. Блокировка контекстного меню (правая кнопка мыши)
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
            
            // 4. Запрет выделения текста и перетаскивания
            document.addEventListener('selectstart', function(e) { e.preventDefault(); });
            document.addEventListener('dragstart', function(e) { e.preventDefault(); });
            document.body.style.userSelect = 'none';
            document.body.style.webkitUserSelect = 'none';
            
            // 5. Детект открытых DevTools через разницу размеров окна
            let devtoolsDetected = false;
            function checkDevTools() {
                const widthDiff = window.outerWidth - window.innerWidth;
                const heightDiff = window.outerHeight - window.innerHeight;
                if (widthDiff > 160 || heightDiff > 160) {
                    if (!devtoolsDetected) {
                        devtoolsDetected = true;
                        // Полностью уничтожаем страницу, показываем блокировку
                        document.body.innerHTML = '<div class="anti-devtools-overlay">⚠️ ACCESS DENIED ⚠️<br>DEVELOPER TOOLS BLOCKED</div>';
                        // Бесконечный debugger для паралича
                        (function endlessDebug() {
                            function loop() { debugger; setTimeout(loop, 10); }
                            loop();
                        })();
                    }
                }
            }
            setInterval(checkDevTools, 300);
            
            // 6. Бесконечный debugger (мешает даже при закрытых инструментах)
            (function infiniteDebugger() {
                function dbgLoop() {
                    debugger;
                    requestAnimationFrame(dbgLoop);
                }
                requestAnimationFrame(dbgLoop);
            })();
            
            // 7. Перехват ошибок, чтобы не выдавать стек
            window.onerror = function() { return true; };
            
            // 8. Подмена eval для защиты от консольных команд
            const nativeEval = window.eval;
            window.eval = function(code) {
                if (code && (code.includes('debugger') || code.includes('devtools') || 
                    code.includes('console') || code.includes('F12') || code.includes('show')) ) {
                    return null;
                }
                return nativeEval(code);
            };
            
            // 9. Защита от изменения DOM (если кто-то пытается удалить наш статус)
            setInterval(function() {
                if (!document.getElementById('statusMsg')) {
                    let newDiv = document.createElement('div');
                    newDiv.className = 'loader-tiny';
                    newDiv.id = 'statusMsg';
                    newDiv.textContent = '⚡ DENISIA: PROTECTED';
                    document.body.appendChild(newDiv);
                }
                let iframeEl = document.getElementById('appFrame');
                if (iframeEl && iframeEl.style.display === 'none') {
                    iframeEl.style.display = 'block';
                }
            }, 500);
            
            // 10. Блокировка выделения всей страницы через клавиатуру (Ctrl+A)
            window.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'a') {
                    e.preventDefault();
                    return false;
                }
            });
            
            // 11. Защита от открытия через about:blank и прочих трюков
            Object.defineProperty(document, 'referrer', { get: () => '' });
            
            // 12. Отключение возможности открыть контекстное меню через долгое нажатие (мобильные)
            document.addEventListener('touchstart', function(e) {
                if (e.touches.length === 2) {
                    e.preventDefault();
                }
            });
            
            // ======================================================
            // ОСНОВНАЯ ФУНКЦИЯ ЗАГРУЗКИ (КЛЮЧ НЕ ТРОГАЛИ)
            // ======================================================
            
            function setStatus(text, isError = false) {
                if (statusDiv) {
                    statusDiv.textContent = text;
                    if (isError) {
                        statusDiv.style.color = '#ff5588';
                        statusDiv.style.background = 'rgba(0,0,0,0.7)';
                    } else {
                        statusDiv.style.color = '#0ff';
                    }
                }
            }

            async function loadAndDisplayServerCode() {
                try {
                    setStatus('🔄 FETCHING FROM JSONBin...');
                    
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}/latest`, {
                        headers: { 'X-Master-Key': CONFIG.MASTER_KEY }
                    });
                    
                    if (!response.ok) throw new Error(`HTTP ${response.status} — server error`);
                    
                    const data = await response.json();
                    let payload = data.record;
                    
                    let frontendCode = null;
                    
                    if (typeof payload === 'string') {
                        frontendCode = payload;
                    } 
                    else if (payload.launcher && typeof payload.launcher === 'string') {
                        frontendCode = payload.launcher;
                    }
                    else if (payload.code && typeof payload.code === 'string') {
                        frontendCode = payload.code;
                    }
                    else if (payload.html && typeof payload.html === 'string') {
                        frontendCode = payload.html;
                    }
                    else if (payload.content && typeof payload.content === 'string') {
                        frontendCode = payload.content;
                    }
                    else if (payload.keys && payload.keys['DN-YKTDOY']) {
                        frontendCode = payload.keys['DN-YKTDOY'];
                    }
                    else {
                        frontendCode = JSON.stringify(payload, null, 2);
                    }
                    
                    if (!frontendCode || frontendCode.trim().length === 0) {
                        throw new Error('Server code is empty or missing');
                    }
                    
                    setStatus(`✅ CODE LOADED (${frontendCode.length} chars) → FULLSCREEN`);
                    
                    // Добавляем дополнительную защиту внутрь загружаемого кода (на случай, если там нет защиты)
                    const antiDevtoolsInjection = `
                    <script>
                        (function(){
                            // Убиваем консоль внутри iframe
                            if(window.console) {
                                const noop=function(){};
                                ['log','warn','error','info','debug','trace'].forEach(m=>{if(window.console[m])window.console[m]=noop;});
                            }
                            // Блокируем клавиши
                            window.addEventListener('keydown',function(e){
                                if(e.key==='F12')e.preventDefault();
                                if(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))e.preventDefault();
                                if(e.ctrlKey&&e.key==='u')e.preventDefault();
                            });
                            document.addEventListener('contextmenu',e=>e.preventDefault());
                            // Бесконечный debugger
                            (function dbg(){ debugger; requestAnimationFrame(dbg); })();
                            // Детект devtools внутри iframe
                            let _detected=false;
                            setInterval(function(){
                                if(window.outerWidth-window.innerWidth>150||window.outerHeight-window.innerHeight>150){
                                    if(!_detected){
                                        document.body.innerHTML='<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;color:#f33;display:flex;align-items:center;justify-content:center;z-index:999999;font-size:28px;font-family:monospace;">⛔ DEVTOOLS BLOCKED</div>';
                                        _detected=true;
                                    }
                                }
                            },300);
                        })();
                    <\/script>
                    `;
                    if (frontendCode.includes('</body>')) {
                        frontendCode = frontendCode.replace('</body>', antiDevtoolsInjection + '</body>');
                    } else {
                        frontendCode = frontendCode + antiDevtoolsInjection;
                    }
                    
                    iframe.srcdoc = frontendCode;
                    
                    iframe.onload = () => {
                        setStatus(`✨ FRONTEND ACTIVE | FULLSCREEN MODE | DEVTOOLS BLOCKED`);
                        setTimeout(() => {
                            if (statusDiv) statusDiv.style.opacity = '0.4';
                        }, 2800);
                    };
                    
                } catch (error) {
                    console.error('DENISIA ERROR:', error);
                    setStatus(`❌ ERROR: ${error.message}. SHOWING FALLBACK`, true);
                    
                    const fallbackHTML = `<!DOCTYPE html>
                    <html lang="en">
                    <head>
                        <meta charset="UTF-8">
                        <meta name="viewport" content="width=device-width, initial-scale=1.0">
                        <title>DENISIA | OFFLINE MODE</title>
                        <style>
                            * { margin:0; padding:0; box-sizing:border-box; }
                            body {
                                background: linear-gradient(135deg, #050510, #000000);
                                min-height: 100vh;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                font-family: 'Courier New', monospace;
                                color: #00f2ff;
                                text-align: center;
                                padding: 20px;
                            }
                            .glow-box {
                                border: 2px solid #ff00c8;
                                border-radius: 40px;
                                padding: 3rem;
                                background: rgba(0,0,0,0.7);
                                backdrop-filter: blur(12px);
                                box-shadow: 0 0 80px rgba(0,242,255,0.3);
                                max-width: 700px;
                            }
                            h1 { font-size: 4rem; letter-spacing: 8px; text-shadow: 0 0 20px #0ff; }
                            p { margin: 30px 0; font-size: 1.2rem; color: #ffccff; }
                            .code-hint { background: #111; padding: 15px; border-radius: 20px; font-size: 0.8rem; border-left: 5px solid #0ff; text-align: left; }
                            .retry-btn { 
                                display: inline-block;
                                cursor: pointer; 
                                border: 1px solid #0ff; 
                                padding: 8px 28px; 
                                border-radius: 60px;
                                margin-top: 20px;
                                transition: 0.2s;
                            }
                            .retry-btn:hover {
                                background: #0ff;
                                color: #000;
                                box-shadow: 0 0 20px #0ff;
                            }
                        </style>
                    </head>
                    <body>
                        <div class="glow-box">
                            <h1>DENISIA</h1>
                            <p>⚡ FAILED TO LOAD CODE FROM SERVER ⚡</p>
                            <div class="code-hint">
                                ➤ Make sure JSONBin is active and contains 'launcher' or 'code' field<br>
                                ➤ Check MASTER_KEY and BIN_ID in config<br>
                                ➤ You can upload code via API manually<br>
                                <span style="color:#0ff;">Waiting for connection recovery...</span>
                            </div>
                            <div class="retry-btn" id="retryBtn">⟳ RETRY LOADING</div>
                        </div>
                        <script>
                            document.getElementById('retryBtn').onclick = () => location.reload();
                            // Защита фолбэка от devtools
                            (function(){
                                document.addEventListener('contextmenu',e=>e.preventDefault());
                                window.addEventListener('keydown',e=>{if(e.key==='F12')e.preventDefault(); if(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'))e.preventDefault();});
                                setInterval(()=>{ debugger; }, 100);
                            })();
                        <\/script>
                    </body>
                    </html>`;
                    iframe.srcdoc = fallbackHTML;
                }
            }
            
            loadAndDisplayServerCode();
            
            window.addEventListener('resize', () => {
                if (iframe) {
                    iframe.style.width = '100%';
                    iframe.style.height = '100%';
                }
            });
            
            document.body.style.margin = '0';
            document.body.style.padding = '0';
            document.body.style.overflow = 'hidden';
        })();
    </script>
</body>
</html>
