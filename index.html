<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENISIA LAUNCHER</title>
</head>
<body style="margin:0; padding:0; background:#000; overflow:hidden;">

    <div id="loader" style="color:#00f2ff; font-family:monospace; text-align:center; margin-top:20vh;">
        <h1 style="letter-spacing:10px;">DENISIA CORE</h1>
        <p>ПОДКЛЮЧЕНИЕ К ОБЛАКУ...</p>
    </div>

    <script>
        // ТВОИ ДАННЫЕ СЕРВЕРА
        const BIN_URL = 'https://api.jsonbin.io/v3/b/69d6c92436566621a8913306/latest';
        const MASTER_KEY = '$2a$10$piBi/4TcAsEwd6rVS6q7/OeIoKMgU9X6ygr6GEpmvK/M5dDBQ/I8y';

        async function launch() {
            try {
                const response = await fetch(BIN_URL, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const data = await response.json();
                
                // Извлекаем твой код (предполагаем, что он в ключе "launcher")
                // Если ты сохранил его под другим именем, поменяй .launcher на свое
                const code = data.record.launcher || data.record.keys?.['DN-YKTDOY'];

                if (code) {
                    // Рендерим фронтенд прямо в браузере
                    document.open();
                    document.write(code);
                    document.close();
                } else {
                    document.getElementById('loader').innerHTML = "ОШИБКА: КОД НЕ НАЙДЕН В ОБЛАКЕ";
                }
            } catch (err) {
                document.getElementById('loader').innerHTML = "ОШИБКА СЕТИ: ПРОВЕРЬТЕ MASTER-KEY";
            }
        }

        launch();
    </script>
</body>
</html>
